# Domain-to-Skill Mapping Configuration
# Format: keyword=plugin-skill
# Multiple keywords can map to the same skill
# Downstream projects: customize this file for your project's domain registry
#
# v2.0: Skill-based delegation (agent-to-skill conversion, spec 006)
# Skills are injected as Task tool briefs instead of agent system prompts.
#
# Usage: sourced by governance-preflight.sh for domain detection

