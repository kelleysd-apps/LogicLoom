# Verification-intent detection — phrases that signal the user wants a
# decorrelated, cross-provider adversarial review ("double-check this",
# "are you sure", "red-team it"). The governance-preflight hook matches these
# case-insensitively as FIXED substrings against the user's prompt and, on a
# match, nudges toward /cross-check (advisory + read-only).
#
# DISCIPLINE (ship-gate enforced by tests/contract/test_orchestration_hook.sh):
#   Every phrase MUST be substring-disjoint from the keywords in
#   plugins/loom-orchestrator-hook/config/domains.conf. domains.conf has
#   `test=testing` matched by an unanchored `grep -qi`, so ANY phrase containing
#   "test" (e.g. "stress test", "verify this" → no, but "stress test" yes) would
#   double-fire the testing-domain block. "stress test" and "verify this" are
#   therefore intentionally EXCLUDED.
#   Prefer multi-word phrases — they are the primary over-fire control.
#
# Tunable without editing the hook. Carried into customer copies by
# /initialize-project. One phrase per line; lines starting with # are comments.

double-check
double check
cross-check
cross check
red-team
red team
peer review
peer-review
adversarial
are you sure
second opinion
sanity check
sanity-check
poke holes
prove me wrong
find the flaws
