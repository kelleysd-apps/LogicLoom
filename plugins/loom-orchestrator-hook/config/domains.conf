# Domain detection configuration
# Format: keyword=domain
#
# Maps detection keywords to a technical DOMAIN. When a keyword matches a user
# message, the governance-preflight hook surfaces the domain and its consolidated
# worker brief (from the governance-core domain-brief registry) as a swarm/team
# worker recommendation. See plugins/loom-governance/domain-briefs/.
#
# v3.1.0: domains collapsed from sdd-domain-* plugins into the core registry.
# Detection is workflow-agnostic — it recommends a worker brief, not a workflow.

# Frontend domain
UI=frontend
component=frontend
React=frontend
CSS=frontend
form=frontend
layout=frontend
responsive=frontend
# Backend domain
API=backend
endpoint=backend
server=backend
auth=backend
service=backend
middleware=backend
route=backend
# Database domain
schema=database
migration=database
query=database
SQL=database
RLS=database
database=database
table=database
# Testing domain
test=testing
TDD=testing
E2E=testing
coverage=testing
QA=testing
assertion=testing
# Security domain
encryption=security
XSS=security
secrets=security
vulnerability=security
CSRF=security
injection=security
authentication=security
# Performance domain
optimize=performance
cache=performance
benchmark=performance
latency=performance
profiling=performance
# DevOps domain
deploy=devops
CI/CD=devops
Docker=devops
pipeline=devops
infrastructure=devops
