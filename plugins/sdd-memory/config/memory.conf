# Memory Context Injection Configuration
# Plugin: sdd-memory v1.0.0
# Sourced by memory-search.sh

# Enable/disable memory context injection
MEMORY_ENABLED=true

# Maximum time (ms) for memory search before timeout
MEMORY_TIMEOUT_MS=3000

# Maximum tokens to inject as context
MEMORY_MAX_TOKENS=2000

# Minimum relevance score (0.0-1.0) for a chunk to be injected
MEMORY_CONFIDENCE_THRESHOLD=0.7

# Maximum number of context chunks to return
MEMORY_MAX_CHUNKS=5

# ── Tier Configuration ──

# Working tier: current session context (highest priority)
WORKING_TIER_SOURCES="specs/\$(git branch --show-current 2>/dev/null || echo dev-main)/*"
WORKING_TIER_PRIORITY=1.0

# Recall tier: recent sessions and frequently used docs
RECALL_TIER_PRIORITY=0.7

# Archival tier: full project knowledge base (lowest priority)
ARCHIVAL_TIER_PRIORITY=0.4

# ── Stop Words ──
# Common words to exclude from keyword extraction
STOP_WORDS="the a an is are was were be been being have has had do does did will would shall should may might can could of in to for on with at by from as into through during before after above below between out off over under"
