# Memory v2.0 Configuration
# Plugin: sdd-memory v2.0.0
# Extended configuration for hybrid search backends.
# Backward compatible — defaults to v1.0 keyword-only behavior.

# ── Backend Selection ──
# keyword  = v1.0 grep-based search (always available, default)
# hybrid   = BM25 + vector search with configurable weights (requires Phase 3)
MEMORY_BACKEND=keyword

# ── Hybrid Search Weights ──
# Only used when MEMORY_BACKEND=hybrid
# Must sum to 1.0
VECTOR_WEIGHT=0.7
KEYWORD_WEIGHT=0.3

# ── Retrieval Settings ──
# MAX_CANDIDATES: how many results each backend retrieves before merging
# INJECT_COUNT: how many final results to inject into context
# INJECT_POSITION: where in context to place results (beginning | end)
MAX_CANDIDATES=10
INJECT_COUNT=5
INJECT_POSITION=beginning

# ── Embedding Configuration ──
# Only used when MEMORY_BACKEND=hybrid
# EMBEDDING_MODEL: local-gguf | sentence-transformers
# EMBEDDING_MODEL_PATH: auto = auto-download on first use
EMBEDDING_MODEL=local-gguf
EMBEDDING_MODEL_PATH=auto

# ── Timeout Budget ──
# Total time budget for memory search (ms)
# Individual backend gets timeout_ms / number_of_backends
MEMORY_TIMEOUT_MS=3000

# ── Retention Policies ──
# Working tier: session-scoped (auto-cleared on new session)
# Recall tier: configurable TTL (format: Nd for N days)
# Archival tier: permanent (user-managed)
WORKING_TTL=session
RECALL_TTL=14d
ARCHIVAL_TTL=permanent

# ── Scoping ──
# session = search only current branch context + active specs
# global  = search all tiers including archival
SCOPE_MODE=session

# ── v1.0 Compatible Settings ──
# These are inherited from memory.conf and kept for backward compatibility
MEMORY_ENABLED=true
MEMORY_MAX_TOKENS=2000
MEMORY_CONFIDENCE_THRESHOLD=0.7
MEMORY_MAX_CHUNKS=5
