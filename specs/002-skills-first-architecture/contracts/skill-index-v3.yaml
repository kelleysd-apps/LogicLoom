# Skill Index Contract v3 (RL-Enhanced)
# Version: 3.0.0
# Purpose: Schema for skill-index.json with RL metrics for skill selection optimization

$schema: "http://json-schema.org/draft-07/schema#"
$id: "skill-index-v3"
title: "RL-Enhanced Skill Index Schema"
description: "Defines the structure of skill-index.json v3 with reinforcement learning metrics"

type: object
required:
  - version
  - generated
  - architecture-mode
  - categories
  - skills
  - routing
  - rl_config
  - statistics

properties:
  version:
    type: string
    const: "3.0.0"
    description: "Index schema version (v3 for RL enhancement)"

  generated:
    type: string
    format: "date-time"
    description: "Index generation timestamp (ISO 8601)"

  architecture-mode:
    type: string
    enum:
      - hybrid
      - skills-first
      - legacy-agents
    default: "hybrid"
    description: "Current architecture mode"

  categories:
    type: array
    items:
      $ref: "#/definitions/CategoryEntry"
    description: "Skill categories with governance levels"

  skills:
    type: array
    items:
      $ref: "#/definitions/SkillEntryV3"
    description: "All registered skills with RL metrics"

  routing:
    $ref: "#/definitions/RoutingTable"
    description: "Trigger-to-skill routing table"

  rl_config:
    $ref: "#/definitions/RLConfig"
    description: "Reinforcement learning configuration"

  statistics:
    $ref: "#/definitions/IndexStatistics"
    description: "Index and RL statistics"

definitions:
  CategoryEntry:
    type: object
    required:
      - name
      - description
      - governance-level
      - skill-count
    properties:
      name:
        type: string
        description: "Category identifier"
      description:
        type: string
        description: "Category purpose"
      governance-level:
        type: string
        enum: [critical, high, medium, low]
      skill-count:
        type: integer
        minimum: 0

  SkillEntryV3:
    type: object
    required:
      - name
      - path
      - category
      - triggers
      - token-budget
      - status
      - rl_metrics
    properties:
      name:
        type: string
        description: "Skill name"

      path:
        type: string
        description: "Path to SKILL.md relative to .claude/"
        examples:
          - "skills/sdd-workflow/sdd-specification/SKILL.md"

      category:
        type: string
        description: "Category name"

      triggers:
        type: array
        items:
          type: string
        description: "Trigger keywords and commands"

      token-budget:
        type: object
        properties:
          layer1:
            type: integer
            description: "Layer 1 token count (~100)"
          layer2:
            type: integer
            description: "Layer 2 token count (~500)"
          layer3:
            type: integer
            description: "Layer 3 token count (variable)"
          total:
            type: integer
            description: "Total token count if fully loaded"

      agents:
        type: array
        items:
          type: string
        description: "Consolidated agents this skill may invoke"

      composes:
        type: array
        items:
          type: string
        description: "Skills this skill composes"

      status:
        type: string
        enum:
          - active
          - deprecated
          - draft
        default: "active"

      deprecated-by:
        type: string
        description: "Replacement skill (if deprecated)"

      # RL Enhancement Fields (NEW in v3)
      rl_metrics:
        $ref: "#/definitions/RLMetrics"
        description: "Reinforcement learning performance metrics"

  RLMetrics:
    type: object
    required:
      - success_rate
      - avg_tokens
      - selection_weight
      - invocation_count
    properties:
      success_rate:
        type: number
        minimum: 0.0
        maximum: 1.0
        default: 0.5
        description: "Task completion rate without errors"

      avg_tokens:
        type: integer
        minimum: 0
        default: 0
        description: "Average tokens used per invocation"

      avg_duration_ms:
        type: integer
        minimum: 0
        default: 0
        description: "Average execution time in milliseconds"

      user_satisfaction:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Explicit user feedback score (optional)"

      selection_weight:
        type: number
        minimum: 0.1
        maximum: 1.0
        default: 0.5
        description: "RL-computed selection probability"

      invocation_count:
        type: integer
        minimum: 0
        default: 0
        description: "Total number of invocations"

      last_updated:
        type: string
        format: "date-time"
        description: "When metrics were last updated"

  RLConfig:
    type: object
    required:
      - algorithm
      - learning_rate
      - reward_weights
    properties:
      algorithm:
        type: string
        enum:
          - ema
          - grpo
          - ppo
        default: "ema"
        description: "RL algorithm (ema for Phase 1-2, grpo/ppo for Phase 3-4)"

      learning_rate:
        type: number
        minimum: 0.01
        maximum: 0.5
        default: 0.1
        description: "Alpha for weight updates"

      reward_weights:
        type: object
        properties:
          success_rate:
            type: number
            default: 0.5
            description: "Weight for task success in reward calculation"
          token_efficiency:
            type: number
            default: 0.3
            description: "Weight for token efficiency in reward calculation"
          user_satisfaction:
            type: number
            default: 0.2
            description: "Weight for user feedback in reward calculation"

      selection_temperature:
        type: number
        minimum: 0.1
        maximum: 2.0
        default: 1.0
        description: "Softmax temperature for skill selection"

      min_weight:
        type: number
        minimum: 0.01
        maximum: 0.5
        default: 0.1
        description: "Minimum selection weight (prevents skill starvation)"

      max_weight:
        type: number
        minimum: 0.5
        maximum: 1.0
        default: 1.0
        description: "Maximum selection weight"

      evaluation_window_days:
        type: integer
        minimum: 1
        maximum: 90
        default: 30
        description: "Rolling window for RL evaluation"

  RoutingTable:
    type: object
    required:
      - command-routes
      - keyword-routes
      - domain-routes
    properties:
      command-routes:
        type: object
        additionalProperties:
          type: string
        description: "Slash command to skill mapping"

      keyword-routes:
        type: object
        additionalProperties:
          type: array
          items:
            type: string
        description: "Keyword to skills mapping (may match multiple)"

      domain-routes:
        type: object
        additionalProperties:
          type: object
          properties:
            primary-skill:
              type: string
            fallback-skill:
              type: string
            primary-agent:
              type: string
        description: "Domain to skill/agent mapping for backward compatibility"

  IndexStatistics:
    type: object
    properties:
      total-skills:
        type: integer
      skills-by-category:
        type: object
        additionalProperties:
          type: integer
      skills-by-status:
        type: object
        additionalProperties:
          type: integer
      total-agents-invoked:
        type: integer
      average-layer1-tokens:
        type: number
      average-layer2-tokens:
        type: number

      # RL Statistics (NEW in v3)
      rl_statistics:
        type: object
        properties:
          avg_selection_weight:
            type: number
            description: "Average selection weight across all skills"
          total_invocations:
            type: integer
            description: "Total skill invocations tracked"
          avg_success_rate:
            type: number
            description: "Average success rate across all skills"
          improvement_over_baseline:
            type: number
            description: "+X% vs rule-based selection (target: 15-25%)"

# Example v3 index
examples:
  - version: "3.0.0"
    generated: "2026-01-13T10:00:00Z"
    architecture-mode: "hybrid"

    categories:
      - name: "sdd-workflow"
        description: "Core SDD methodology skills"
        governance-level: "high"
        skill-count: 4

      - name: "validation"
        description: "Quality gates and compliance skills"
        governance-level: "high"
        skill-count: 5

    skills:
      - name: "sdd-specification"
        path: "skills/sdd-workflow/sdd-specification/SKILL.md"
        category: "sdd-workflow"
        triggers:
          - "/specify"
          - "specification"
          - "requirements"
        token-budget:
          layer1: 85
          layer2: 450
          layer3: 800
          total: 1335
        agents:
          - "specification-orchestrator"
        status: "active"
        rl_metrics:
          success_rate: 0.92
          avg_tokens: 1200
          avg_duration_ms: 45000
          selection_weight: 0.85
          invocation_count: 150
          last_updated: "2026-01-13T09:30:00Z"

    routing:
      command-routes:
        "/specify": "sdd-workflow/sdd-specification"
        "/plan": "sdd-workflow/sdd-planning"
        "/tasks": "sdd-workflow/sdd-tasks"
        "/debug": "sdd-workflow/sdd-debug"

      keyword-routes:
        "specification":
          - "sdd-workflow/sdd-specification"
        "database":
          - "domain/database-operations"
          - "sdd-workflow/sdd-planning"

      domain-routes:
        database:
          primary-skill: "domain/database-operations"
          fallback-skill: "sdd-workflow/sdd-planning"
          primary-agent: "database-specialist"

    rl_config:
      algorithm: "ema"
      learning_rate: 0.1
      reward_weights:
        success_rate: 0.5
        token_efficiency: 0.3
        user_satisfaction: 0.2
      selection_temperature: 1.0
      min_weight: 0.1
      max_weight: 1.0
      evaluation_window_days: 30

    statistics:
      total-skills: 35
      skills-by-category:
        sdd-workflow: 4
        validation: 5
        governance: 2
        orchestration: 3
        domain: 7
        creation: 3
        project-initialization: 1
        integration: 1
      skills-by-status:
        active: 33
        deprecated: 2
        draft: 0
      total-agents-invoked: 8
      average-layer1-tokens: 88
      average-layer2-tokens: 485
      rl_statistics:
        avg_selection_weight: 0.65
        total_invocations: 1500
        avg_success_rate: 0.87
        improvement_over_baseline: 0.18

# Migration from v2 to v3
migration:
  from-v2:
    description: "Upgrade from skill-index.json v2 to v3"
    steps:
      - "Add rl_metrics to each skill entry (initialize with defaults)"
      - "Add rl_config section with algorithm='ema'"
      - "Add rl_statistics to statistics section"
      - "Update version to '3.0.0'"

  backward-compatibility:
    description: "v2 consumers can still read v3 index"
    notes:
      - "skills array structure unchanged except rl_metrics addition"
      - "rl_config and rl_statistics are additive fields"
      - "domain-routes provides agent fallback for legacy patterns"
