# Skill Definition Contract v3 (RL-Enhanced)
# Version: 3.0.0
# Purpose: Schema for enhanced SKILL.md frontmatter with RL metrics

$schema: "http://json-schema.org/draft-07/schema#"
$id: "skill-definition-v3"
title: "RL-Enhanced Skill Definition Schema"
description: "Defines the structure of SKILL.md frontmatter for skills-first architecture with RL metrics"

type: object
required:
  - name
  - version
  - description
  - triggers
  - progressive-disclosure
  - rl_metrics

properties:
  # Layer 1: Metadata (Always loaded ~100 tokens)
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]*[a-z0-9]$"
    minLength: 3
    maxLength: 50
    description: "Skill identifier in kebab-case"
    examples:
      - "sdd-specification"
      - "database-operations"
      - "create-skill"

  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: "Semantic version (X.Y.Z)"
    examples:
      - "1.0.0"
      - "2.1.0"
      - "3.0.0"

  description:
    type: string
    minLength: 50
    maxLength: 1024
    description: "What the skill does and when to use it"

  category:
    type: string
    enum:
      - sdd-workflow
      - validation
      - governance
      - orchestration
      - domain
      - creation
      - project-initialization
      - integration
    description: "Skill category for organization"

  triggers:
    type: array
    minItems: 1
    maxItems: 10
    items:
      type: string
      minLength: 2
      maxLength: 50
    description: "Keywords and commands that activate this skill"
    examples:
      - ["/specify", "specification", "requirements", "spec"]
      - ["/plan", "implementation plan", "technical research"]

  # RL Enhancement Fields (NEW in v3)
  rl_metrics:
    $ref: "#/definitions/RLMetrics"
    description: "Reinforcement learning performance metrics"

  # Layer 2: Instructions (On activation ~500 tokens)
  allowed-tools:
    type: array
    items:
      type: string
      enum:
        - Read
        - Write
        - Edit
        - MultiEdit
        - Bash
        - Grep
        - Glob
        - WebSearch
        - Task
        - TodoWrite
    description: "Tool restrictions (default: all tools allowed)"
    default: []

  agent-invocations:
    type: array
    items:
      $ref: "#/definitions/AgentInvocation"
    description: "Consolidated agents this skill may invoke with context specifications"

  composes:
    type: array
    items:
      $ref: "#/definitions/SkillComposition"
    description: "Other skills this skill composes"

  progressive-disclosure:
    $ref: "#/definitions/ProgressiveDisclosure"
    description: "Layer definitions for token-efficient loading"

  # Layer 3: Supporting files (On demand, variable tokens)
  # These are file paths, not inline content
  examples:
    type: string
    description: "Relative path to examples file"
    examples:
      - "./examples.md"

  references:
    type: string
    description: "Relative path to reference file"
    examples:
      - "./reference.md"

  scripts:
    type: string
    description: "Relative path to scripts directory"
    examples:
      - "./scripts/"

definitions:
  RLMetrics:
    type: object
    required:
      - success_rate
      - selection_weight
    properties:
      success_rate:
        type: number
        minimum: 0.0
        maximum: 1.0
        default: 0.5
        description: "Task completion rate without errors"

      avg_tokens:
        type: integer
        minimum: 0
        default: 0
        description: "Average tokens used per invocation"

      avg_duration_ms:
        type: integer
        minimum: 0
        default: 0
        description: "Average execution time in milliseconds"

      user_satisfaction:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Explicit user feedback score (optional)"

      selection_weight:
        type: number
        minimum: 0.1
        maximum: 1.0
        default: 0.5
        description: "RL-computed selection probability"

      invocation_count:
        type: integer
        minimum: 0
        default: 0
        description: "Total number of invocations"

  AgentInvocation:
    type: object
    required:
      - agent
      - context-subset
      - when
    properties:
      agent:
        type: string
        description: "Consolidated agent identifier (e.g., database-specialist)"
        examples:
          - "database-specialist"
          - "implementation-specialist"
          - "specification-orchestrator"
          - "quality-specialist"

      context-subset:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 10
        description: "Specific context fields to pass to agent"
        examples:
          - ["data-model", "constraints"]
          - ["api-contracts", "endpoints"]

      when:
        type: string
        minLength: 10
        maxLength: 200
        description: "Condition that triggers this agent invocation"
        examples:
          - "database schema work needed"
          - "API endpoint design required"

      timeout:
        type: string
        pattern: "^\\d+[smh]$"
        default: "5m"
        description: "Maximum execution time"
        examples:
          - "30s"
          - "5m"
          - "1h"

      retry:
        type: object
        properties:
          max-attempts:
            type: integer
            minimum: 1
            maximum: 5
            default: 1
          delay:
            type: string
            pattern: "^\\d+[smh]$"
            default: "10s"

  SkillComposition:
    type: object
    required:
      - skill
      - phase
    properties:
      skill:
        type: string
        description: "Skill path (category/skill-name)"
        examples:
          - "validation/constitutional-compliance"
          - "validation/domain-detection"

      phase:
        type: string
        enum:
          - pre-execution
          - analysis
          - execution
          - post-execution
          - validation
        description: "When to invoke composed skill"

      context:
        type: object
        additionalProperties: true
        description: "Context to pass to composed skill"

  ProgressiveDisclosure:
    type: object
    required:
      - layer1
      - layer2
      - layer3
    properties:
      layer1:
        type: array
        items:
          type: string
        description: "Fields always loaded (~100 tokens)"
        default: ["name", "description", "triggers", "category", "version", "rl_metrics"]

      layer2:
        type: array
        items:
          type: string
        description: "Fields loaded on activation (~500 tokens)"
        default: ["instructions", "agent-invocations", "composes", "allowed-tools"]

      layer3:
        type: array
        items:
          type: string
        description: "Fields loaded on demand (variable tokens)"
        default: ["examples", "references", "scripts"]

# Example complete skill definition with RL
examples:
  - name: "sdd-specification"
    version: "3.0.0"
    description: |
      Create feature specifications using Specification-Driven Development (SDD) methodology.
      Use when starting a new feature, documenting requirements, or executing the /specify command.
      This skill guides creation of comprehensive feature specifications and determines agent needs.
    category: "sdd-workflow"
    triggers:
      - "/specify"
      - "specification"
      - "requirements"
      - "feature spec"
    rl_metrics:
      success_rate: 0.92
      avg_tokens: 1200
      avg_duration_ms: 45000
      user_satisfaction: 0.93
      selection_weight: 0.85
      invocation_count: 150
    allowed-tools:
      - Read
      - Write
      - Bash
      - Grep
    agent-invocations:
      - agent: "specification-orchestrator"
        context-subset:
          - "feature-description"
          - "user-requirements"
          - "constraints"
        when: "complex requirements need detailed specification analysis"
        timeout: "10m"
    composes:
      - skill: "validation/domain-detection"
        phase: "analysis"
      - skill: "validation/constitutional-compliance"
        phase: "pre-execution"
      - skill: "validation/message-preflight"
        phase: "pre-execution"
    progressive-disclosure:
      layer1:
        - name
        - description
        - triggers
        - category
        - version
        - rl_metrics
      layer2:
        - instructions
        - agent-invocations
        - composes
        - allowed-tools
      layer3:
        - examples
        - references
        - scripts

# Migration from v2 to v3
migration:
  from-v2:
    description: "Upgrade from skill-definition v2 to v3"
    steps:
      - "Add rl_metrics field with default values"
      - "Update progressive-disclosure.layer1 to include rl_metrics"
      - "Update agent references to use consolidated agent names"
      - "Add message-preflight to composes for FR-707 compliance"

  agent-mapping:
    description: "Map old agent names to consolidated agents"
    mapping:
      frontend-specialist: "implementation-specialist"
      full-stack-developer: "implementation-specialist"
      devops-engineer: "operations-specialist"
      performance-engineer: "operations-specialist"
      specification-agent: "specification-orchestrator"
      planning-agent: "specification-orchestrator"
      tasks-agent: "specification-orchestrator"
      prd-specialist: "specification-orchestrator"
      testing-specialist: "quality-specialist"
      security-specialist: "quality-specialist"
      subagent-architect: "system-architect"
      task-orchestrator: "workflow-coordinator"
