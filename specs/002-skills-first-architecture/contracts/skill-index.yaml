# Skill Index Contract
# Version: 2.0.0
# Purpose: Schema for skill-index.json - primary routing mechanism

$schema: "http://json-schema.org/draft-07/schema#"
$id: "skill-index-v2"
title: "Skill Index Schema"
description: "Defines the structure of skill-index.json for skills-first routing"

type: object
required:
  - version
  - generated
  - categories
  - skills
  - routing

properties:
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: "Index schema version"
    const: "2.0.0"

  generated:
    type: string
    format: "date-time"
    description: "Index generation timestamp (ISO 8601)"

  architecture-mode:
    type: string
    enum:
      - hybrid
      - skills-first
      - legacy-agents
    default: "hybrid"
    description: "Current architecture mode"

  categories:
    type: array
    items:
      $ref: "#/definitions/CategoryEntry"
    description: "Skill categories"

  skills:
    type: array
    items:
      $ref: "#/definitions/SkillEntry"
    description: "All registered skills"

  routing:
    $ref: "#/definitions/RoutingTable"
    description: "Trigger-to-skill routing table"

  statistics:
    $ref: "#/definitions/IndexStatistics"
    description: "Index statistics for monitoring"

definitions:
  CategoryEntry:
    type: object
    required:
      - name
      - description
      - governance-level
      - skill-count
    properties:
      name:
        type: string
        description: "Category identifier"
      description:
        type: string
        description: "Category purpose"
      governance-level:
        type: string
        enum: [critical, high, medium, low]
      skill-count:
        type: integer
        minimum: 0

  SkillEntry:
    type: object
    required:
      - name
      - path
      - category
      - triggers
      - token-budget
      - status
    properties:
      name:
        type: string
        description: "Skill name"

      path:
        type: string
        description: "Path to SKILL.md relative to .claude/"
        examples:
          - "skills/sdd-workflow/sdd-specification/SKILL.md"

      category:
        type: string
        description: "Category name"

      triggers:
        type: array
        items:
          type: string
        description: "Trigger keywords and commands"

      token-budget:
        type: object
        properties:
          layer1:
            type: integer
            description: "Layer 1 token count"
          layer2:
            type: integer
            description: "Layer 2 token count"
          layer3:
            type: integer
            description: "Layer 3 token count (estimated)"
          total:
            type: integer
            description: "Total token count if fully loaded"

      agents:
        type: array
        items:
          type: string
        description: "Agents this skill may invoke"

      composes:
        type: array
        items:
          type: string
        description: "Skills this skill composes"

      status:
        type: string
        enum:
          - active
          - deprecated
          - draft
        default: "active"

      deprecated-by:
        type: string
        description: "Replacement skill (if deprecated)"

      migration-notes:
        type: string
        description: "Migration guidance (if deprecated)"

  RoutingTable:
    type: object
    required:
      - command-routes
      - keyword-routes
      - domain-routes
    properties:
      command-routes:
        type: object
        additionalProperties:
          type: string
        description: "Slash command to skill mapping"
        examples:
          - "/specify": "sdd-workflow/sdd-specification"
            "/plan": "sdd-workflow/sdd-planning"
            "/tasks": "sdd-workflow/sdd-tasks"

      keyword-routes:
        type: object
        additionalProperties:
          type: array
          items:
            type: string
        description: "Keyword to skills mapping (may match multiple)"
        examples:
          - "specification": ["sdd-workflow/sdd-specification"]
            "database": ["domain/database-operations", "sdd-workflow/sdd-planning"]

      domain-routes:
        type: object
        additionalProperties:
          type: object
          properties:
            primary-skill:
              type: string
            fallback-skill:
              type: string
            primary-agent:
              type: string
        description: "Domain to skill/agent mapping for backward compatibility"

  IndexStatistics:
    type: object
    properties:
      total-skills:
        type: integer
      skills-by-category:
        type: object
        additionalProperties:
          type: integer
      skills-by-status:
        type: object
        additionalProperties:
          type: integer
      total-agents-invoked:
        type: integer
      average-layer1-tokens:
        type: number
      average-layer2-tokens:
        type: number

# Example index
examples:
  - version: "2.0.0"
    generated: "2026-01-12T10:00:00Z"
    architecture-mode: "hybrid"

    categories:
      - name: "sdd-workflow"
        description: "Core SDD methodology skills"
        governance-level: "high"
        skill-count: 3

      - name: "validation"
        description: "Quality gates and compliance skills"
        governance-level: "high"
        skill-count: 5

      - name: "orchestration"
        description: "Multi-skill coordination skills"
        governance-level: "high"
        skill-count: 3

      - name: "domain"
        description: "Domain-specific procedural knowledge"
        governance-level: "medium"
        skill-count: 7

    skills:
      - name: "sdd-specification"
        path: "skills/sdd-workflow/sdd-specification/SKILL.md"
        category: "sdd-workflow"
        triggers:
          - "/specify"
          - "specification"
          - "requirements"
          - "feature spec"
        token-budget:
          layer1: 85
          layer2: 450
          layer3: 800
          total: 1335
        agents:
          - "specification-agent"
        composes:
          - "validation/domain-detection"
          - "validation/constitutional-compliance"
        status: "active"

      - name: "sdd-planning"
        path: "skills/sdd-workflow/sdd-planning/SKILL.md"
        category: "sdd-workflow"
        triggers:
          - "/plan"
          - "implementation plan"
          - "technical research"
        token-budget:
          layer1: 90
          layer2: 520
          layer3: 950
          total: 1560
        agents:
          - "planning-agent"
          - "database-specialist"
          - "backend-architect"
        composes:
          - "validation/constitutional-compliance"
        status: "active"

    routing:
      command-routes:
        "/specify": "sdd-workflow/sdd-specification"
        "/plan": "sdd-workflow/sdd-planning"
        "/tasks": "sdd-workflow/sdd-tasks"
        "/create-skill": "creation/create-skill"
        "/create-agent": "creation/create-agent"

      keyword-routes:
        "specification":
          - "sdd-workflow/sdd-specification"
        "requirements":
          - "sdd-workflow/sdd-specification"
        "database":
          - "domain/database-operations"
          - "sdd-workflow/sdd-planning"
        "api":
          - "domain/backend-operations"
          - "sdd-workflow/sdd-planning"
        "frontend":
          - "domain/frontend-operations"
        "security":
          - "domain/security-operations"

      domain-routes:
        database:
          primary-skill: "domain/database-operations"
          fallback-skill: "sdd-workflow/sdd-planning"
          primary-agent: "database-specialist"
        backend:
          primary-skill: "domain/backend-operations"
          fallback-skill: "sdd-workflow/sdd-planning"
          primary-agent: "backend-architect"
        frontend:
          primary-skill: "domain/frontend-operations"
          fallback-skill: null
          primary-agent: "frontend-specialist"

    statistics:
      total-skills: 35
      skills-by-category:
        sdd-workflow: 3
        validation: 5
        governance: 2
        orchestration: 3
        domain: 7
        creation: 3
        project-initialization: 1
        integration: 1
      skills-by-status:
        active: 33
        deprecated: 2
        draft: 0
      total-agents-invoked: 15
      average-layer1-tokens: 88
      average-layer2-tokens: 485

# Migration support
migration:
  from-v1:
    description: "Upgrade from skill-index.json v1 to v2"
    steps:
      - "Add architecture-mode field (default: hybrid)"
      - "Add token-budget to each skill entry"
      - "Add routing section with command/keyword/domain routes"
      - "Add statistics section"
      - "Update category entries with governance-level"
      - "Add status field to skill entries (default: active)"

  backward-compatibility:
    description: "v1 consumers can still read v2 index"
    notes:
      - "skills array structure unchanged"
      - "New fields are additive, not breaking"
      - "domain-routes provides agent fallback for legacy patterns"
