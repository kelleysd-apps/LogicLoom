# RL Metrics Contract
# Version: 1.0.0
# Purpose: Schema for RL performance tracking and reward calculation (FR-600 series)

$schema: "http://json-schema.org/draft-07/schema#"
$id: "rl-metrics-v1"
title: "RL Performance Metrics Schema"
description: "Defines the structure of skill-performance.json and RL reward calculation"

type: object
required:
  - version
  - last_updated
  - total_invocations
  - skills
  - global_metrics

properties:
  version:
    type: string
    const: "1.0.0"
    description: "Schema version"

  last_updated:
    type: string
    format: "date-time"
    description: "Last update timestamp (ISO 8601)"

  total_invocations:
    type: integer
    minimum: 0
    default: 0
    description: "Total skill invocations tracked"

  skills:
    type: object
    additionalProperties:
      $ref: "#/definitions/SkillPerformance"
    description: "Per-skill performance data keyed by skill path"

  global_metrics:
    $ref: "#/definitions/GlobalRLMetrics"
    description: "Framework-wide RL metrics"

  evaluation_config:
    $ref: "#/definitions/EvaluationConfig"
    description: "Configuration for RL evaluation"

definitions:
  SkillPerformance:
    type: object
    required:
      - skill_name
      - current_weight
      - invocation_count
      - success_count
    properties:
      skill_name:
        type: string
        description: "Skill identifier (kebab-case)"

      current_weight:
        type: number
        minimum: 0.1
        maximum: 1.0
        default: 0.5
        description: "Current RL selection weight"

      invocation_count:
        type: integer
        minimum: 0
        default: 0
        description: "Total invocations"

      success_count:
        type: integer
        minimum: 0
        default: 0
        description: "Successful invocations"

      failure_count:
        type: integer
        minimum: 0
        default: 0
        description: "Failed invocations"

      partial_count:
        type: integer
        minimum: 0
        default: 0
        description: "Partially successful invocations"

      total_tokens:
        type: integer
        minimum: 0
        default: 0
        description: "Cumulative tokens used"

      total_duration_ms:
        type: integer
        minimum: 0
        default: 0
        description: "Cumulative execution time"

      avg_tokens:
        type: number
        minimum: 0
        description: "Average tokens per invocation (computed)"

      avg_duration_ms:
        type: number
        minimum: 0
        description: "Average duration per invocation (computed)"

      success_rate:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Success rate (computed: success_count / invocation_count)"

      user_satisfaction_sum:
        type: number
        default: 0
        description: "Sum of user satisfaction scores"

      user_satisfaction_count:
        type: integer
        minimum: 0
        default: 0
        description: "Number of user satisfaction ratings"

      avg_user_satisfaction:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Average user satisfaction (computed)"

      learning_history:
        type: array
        items:
          $ref: "#/definitions/LearningEntry"
        maxItems: 100
        description: "Last N weight updates (rolling window)"

  LearningEntry:
    type: object
    required:
      - timestamp
      - reward
      - weight_before
      - weight_after
      - outcome
    properties:
      timestamp:
        type: string
        format: "date-time"
        description: "When the update occurred"

      reward:
        type: number
        description: "Computed reward for this invocation"

      weight_before:
        type: number
        description: "Selection weight before update"

      weight_after:
        type: number
        description: "Selection weight after update"

      weight_delta:
        type: number
        description: "Change to selection weight"

      outcome:
        type: string
        enum:
          - success
          - failure
          - partial
        description: "Invocation outcome"

      tokens_used:
        type: integer
        minimum: 0
        description: "Tokens used in this invocation"

      duration_ms:
        type: integer
        minimum: 0
        description: "Execution duration in milliseconds"

      user_satisfaction:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "User satisfaction if provided"

      context:
        type: object
        additionalProperties: true
        description: "Additional context for debugging"

  GlobalRLMetrics:
    type: object
    required:
      - avg_selection_accuracy
      - total_reward
    properties:
      avg_selection_accuracy:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Average correct skill selection rate"

      improvement_over_baseline:
        type: number
        description: "+X% vs rule-based selection (target: 15-25%)"

      total_reward:
        type: number
        description: "Cumulative reward across all skills"

      avg_reward:
        type: number
        description: "Average reward per invocation"

      best_performing_skill:
        type: string
        description: "Skill with highest success rate"

      worst_performing_skill:
        type: string
        description: "Skill with lowest success rate"

      evaluation_window_start:
        type: string
        format: "date-time"
        description: "Start of evaluation window"

      evaluation_window_end:
        type: string
        format: "date-time"
        description: "End of evaluation window"

  EvaluationConfig:
    type: object
    properties:
      algorithm:
        type: string
        enum:
          - ema
          - grpo
          - ppo
        default: "ema"
        description: "Active RL algorithm"

      learning_rate:
        type: number
        minimum: 0.01
        maximum: 0.5
        default: 0.1
        description: "Alpha for EMA updates"

      reward_weights:
        type: object
        properties:
          success_rate:
            type: number
            default: 0.5
          token_efficiency:
            type: number
            default: 0.3
          user_satisfaction:
            type: number
            default: 0.2

      baseline_tokens:
        type: integer
        default: 2000
        description: "Baseline token count for efficiency calculation"

      evaluation_window_days:
        type: integer
        minimum: 1
        maximum: 90
        default: 30
        description: "Rolling window for evaluation"

# Reward calculation formulas
reward_calculation:
  description: "How rewards are calculated for RL weight updates"

  ema_formula:
    description: "Exponential Moving Average (Phase 1-2)"
    formula: |
      # Calculate raw reward components
      success_component = success_rate * reward_weights.success_rate
      token_efficiency = max(0, (baseline_tokens - avg_tokens) / baseline_tokens)
      efficiency_component = token_efficiency * reward_weights.token_efficiency
      satisfaction_component = user_satisfaction * reward_weights.user_satisfaction

      # Total reward
      reward = success_component + efficiency_component + satisfaction_component

      # Update selection weight
      new_weight = learning_rate * reward + (1 - learning_rate) * current_weight

      # Clamp to bounds
      new_weight = clamp(new_weight, min_weight, max_weight)

  grpo_formula:
    description: "Generalized Reward Policy Optimization (Phase 3-4)"
    formula: |
      # Policy gradient update
      advantage = reward - baseline_reward
      log_prob = log(selection_probability)
      gradient = log_prob * advantage

      # Update policy parameters
      theta = theta + learning_rate * gradient

      # Convert to selection weights via softmax
      selection_weight = softmax(theta, temperature)

# Example skill-performance.json
examples:
  - version: "1.0.0"
    last_updated: "2026-01-13T10:00:00Z"
    total_invocations: 1500

    skills:
      "sdd-workflow/sdd-specification":
        skill_name: "sdd-specification"
        current_weight: 0.85
        invocation_count: 150
        success_count: 138
        failure_count: 8
        partial_count: 4
        total_tokens: 180000
        total_duration_ms: 6750000
        avg_tokens: 1200
        avg_duration_ms: 45000
        success_rate: 0.92
        user_satisfaction_sum: 120.5
        user_satisfaction_count: 130
        avg_user_satisfaction: 0.927
        learning_history:
          - timestamp: "2026-01-13T09:30:00Z"
            reward: 0.88
            weight_before: 0.83
            weight_after: 0.85
            weight_delta: 0.02
            outcome: "success"
            tokens_used: 1150
            duration_ms: 42000
            user_satisfaction: 0.95

      "sdd-workflow/sdd-planning":
        skill_name: "sdd-planning"
        current_weight: 0.78
        invocation_count: 120
        success_count: 108
        failure_count: 6
        partial_count: 6
        total_tokens: 216000
        total_duration_ms: 7200000
        avg_tokens: 1800
        avg_duration_ms: 60000
        success_rate: 0.90
        user_satisfaction_sum: 95.0
        user_satisfaction_count: 100
        avg_user_satisfaction: 0.95
        learning_history: []

    global_metrics:
      avg_selection_accuracy: 0.87
      improvement_over_baseline: 0.18
      total_reward: 1320.5
      avg_reward: 0.88
      best_performing_skill: "database-operations"
      worst_performing_skill: "migration-workflow"
      evaluation_window_start: "2025-12-13T00:00:00Z"
      evaluation_window_end: "2026-01-13T00:00:00Z"

    evaluation_config:
      algorithm: "ema"
      learning_rate: 0.1
      reward_weights:
        success_rate: 0.5
        token_efficiency: 0.3
        user_satisfaction: 0.2
      baseline_tokens: 2000
      evaluation_window_days: 30

# Validation rules
validation:
  weight_bounds:
    description: "Selection weights must be in [0.1, 1.0]"
    rule: "0.1 <= current_weight <= 1.0 for all skills"

  count_consistency:
    description: "Invocation count must equal sum of outcome counts"
    rule: "invocation_count == success_count + failure_count + partial_count"

  rate_computation:
    description: "Success rate computed correctly"
    rule: "success_rate == success_count / invocation_count (if count > 0)"

  history_limit:
    description: "Learning history limited to prevent unbounded growth"
    rule: "learning_history.length <= 100"

  improvement_target:
    description: "Target improvement over baseline (FR-604)"
    rule: "improvement_over_baseline should approach 0.15-0.25 over time"

# Performance targets (FR-600 series)
performance_targets:
  skill_selection_accuracy_improvement:
    target: "+15-25%"
    measurement: "improvement_over_baseline"
    description: "RL should improve skill selection accuracy by 15-25% over rule-based baseline"

  weight_convergence:
    target: "30 days"
    description: "Skill weights should stabilize within 30 days of operation"

  learning_history_retention:
    target: "100 entries"
    description: "Retain last 100 weight updates per skill for debugging"
