# Agent Definition Contract v2 (Consolidated with Skill Portfolio)
# Version: 2.0.0
# Purpose: Schema for consolidated agent definitions in skills-first architecture

$schema: "http://json-schema.org/draft-07/schema#"
$id: "agent-definition-v2"
title: "Consolidated Agent Definition Schema"
description: "Defines the lightweight agent structure for skills-first architecture with skill portfolios"

type: object
required:
  - name
  - purpose
  - required-context
  - output-format
  - tools
  - department
  - skill-portfolio

properties:
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]*[a-z0-9]$"
    minLength: 3
    maxLength: 50
    description: "Agent identifier in kebab-case"
    examples:
      - "implementation-specialist"
      - "operations-specialist"
      - "specification-orchestrator"
      - "quality-specialist"
      - "database-specialist"

  purpose:
    type: string
    minLength: 20
    maxLength: 256
    description: "Single sentence describing agent's execution role"
    examples:
      - "Build UI components and full-stack integrations"
      - "Manage runtime infrastructure and performance optimization"
      - "Orchestrate product workflow from PRD through tasks"
      - "Ensure quality through testing and security review"

  required-context:
    type: array
    items:
      type: string
      minLength: 2
      maxLength: 50
    minItems: 1
    maxItems: 10
    description: "Context fields agent needs from invoking skill"
    examples:
      - ["ui-requirements", "design-system", "component-specs"]
      - ["deployment-target", "infrastructure-config", "monitoring-requirements"]

  output-format:
    type: string
    enum:
      - markdown
      - json
      - yaml
      - sql
      - typescript
      - python
      - bash
      - text
    description: "Format of agent's output"

  tools:
    type: array
    items:
      type: string
      enum:
        - Read
        - Write
        - Edit
        - MultiEdit
        - Bash
        - Grep
        - Glob
        - WebSearch
        - Task
        - TodoWrite
    minItems: 1
    description: "Tools agent may use"

  model:
    type: string
    enum:
      - opus
      - sonnet
      - haiku
    default: "opus"
    description: "AI model for execution (default: opus)"

  department:
    type: string
    enum:
      - architecture
      - data
      - engineering
      - operations
      - product
      - quality
    description: "Organizational department"

  # NEW in v2: Skill Portfolio
  skill-portfolio:
    type: array
    items:
      type: string
      pattern: "^[a-z][a-z0-9-]*/[a-z][a-z0-9-]*$"
    minItems: 1
    description: "Skills this agent can execute (category/skill-name format)"
    examples:
      - ["domain/frontend-operations", "domain/backend-operations", "orchestration/full-stack-feature"]
      - ["domain/deployment", "domain/ci-cd", "domain/monitoring", "domain/performance-optimization"]

  # NEW in v2: Consolidation Tracking
  merged-from:
    type: array
    items:
      type: string
    description: "Original agents merged into this (for consolidation tracking)"
    examples:
      - ["frontend-specialist", "full-stack-developer"]
      - ["devops-engineer", "performance-engineer"]

  # NEW in v2: RL Performance
  rl_performance:
    $ref: "#/definitions/AgentRLMetrics"
    description: "Per-agent RL performance metrics"

  invoked-by:
    type: array
    items:
      type: string
      pattern: "^[a-z][a-z0-9-]*/[a-z][a-z0-9-]*$"
    description: "Skills that may invoke this agent (category/skill-name format)"
    examples:
      - ["sdd-workflow/sdd-planning", "domain/database-operations"]

definitions:
  AgentRLMetrics:
    type: object
    properties:
      invocation_count:
        type: integer
        minimum: 0
        default: 0
        description: "Total invocations across all skills"

      success_rate:
        type: number
        minimum: 0.0
        maximum: 1.0
        default: 0.5
        description: "Overall success rate"

      avg_tokens:
        type: integer
        minimum: 0
        default: 0
        description: "Average tokens per invocation"

      skill_success_rates:
        type: object
        additionalProperties:
          type: number
        description: "Success rate per invoking skill"

# Comparison: Current vs Consolidated
comparison:
  current-agent:
    context-size: "~5000 tokens"
    count: "15 domain agents"
    includes:
      - full-constitution
      - full-claude-md
      - full-workflow-description
      - decision-making-logic
      - examples-and-references
    decision-making: "autonomous"

  consolidated-agent:
    context-size: "~500 tokens"
    count: "8 domain agents"
    includes:
      - purpose-statement
      - required-context-fields
      - output-format
      - tool-list
      - skill-portfolio
    decision-making: "minimal (execution focus)"
    receives-from-skill:
      - task-specific-context
      - relevant-constraints
      - output-expectations

# Consolidated Agents Registry (FR-610-614)
consolidated-agents:
  - name: "implementation-specialist"
    purpose: "Build UI components and full-stack integrations"
    department: "engineering"
    merged-from:
      - "frontend-specialist"
      - "full-stack-developer"
    skill-portfolio:
      - "domain/frontend-operations"
      - "domain/backend-operations"
      - "orchestration/full-stack-feature"

  - name: "operations-specialist"
    purpose: "Manage runtime infrastructure and performance optimization"
    department: "operations"
    merged-from:
      - "devops-engineer"
      - "performance-engineer"
    skill-portfolio:
      - "domain/deployment"
      - "domain/ci-cd"
      - "domain/monitoring"
      - "domain/performance-optimization"

  - name: "specification-orchestrator"
    purpose: "Orchestrate product workflow from PRD through tasks"
    department: "product"
    merged-from:
      - "specification-agent"
      - "planning-agent"
      - "tasks-agent"
      - "prd-specialist"
    skill-portfolio:
      - "sdd-workflow/sdd-specification"
      - "sdd-workflow/sdd-planning"
      - "sdd-workflow/sdd-tasks"
      - "creation/prd-creation"

  - name: "quality-specialist"
    purpose: "Ensure quality through testing and security review"
    department: "quality"
    merged-from:
      - "testing-specialist"
      - "security-specialist"
    skill-portfolio:
      - "domain/test-strategy"
      - "domain/security-review"
      - "validation/qa-validation"

  - name: "backend-architect"
    purpose: "Design APIs and backend services"
    department: "architecture"
    merged-from: []
    skill-portfolio:
      - "domain/api-design"
      - "domain/service-architecture"

  - name: "system-architect"
    purpose: "Design system architecture and agent structures"
    department: "architecture"
    merged-from:
      - "subagent-architect"
    skill-portfolio:
      - "creation/create-agent"
      - "domain/system-design"

  - name: "database-specialist"
    purpose: "Manage database schemas, queries, and data operations"
    department: "data"
    merged-from: []
    skill-portfolio:
      - "domain/database-operations"
      - "domain/schema-design"

  - name: "workflow-coordinator"
    purpose: "Coordinate multi-skill workflows and migrations"
    department: "product"
    merged-from:
      - "task-orchestrator"
    skill-portfolio:
      - "orchestration/multi-skill-workflow"
      - "orchestration/migration-workflow"

# Example complete agent definition v2
examples:
  - name: "implementation-specialist"
    purpose: "Build UI components and full-stack integrations"
    required-context:
      - ui-requirements
      - design-system
      - component-specifications
      - api-contracts
    output-format: "typescript"
    tools:
      - Read
      - Write
      - Edit
      - MultiEdit
      - Bash
    model: "opus"
    department: "engineering"
    skill-portfolio:
      - "domain/frontend-operations"
      - "domain/backend-operations"
      - "orchestration/full-stack-feature"
    merged-from:
      - "frontend-specialist"
      - "full-stack-developer"
    rl_performance:
      invocation_count: 200
      success_rate: 0.88
      avg_tokens: 1500
      skill_success_rates:
        "domain/frontend-operations": 0.90
        "domain/backend-operations": 0.85
        "orchestration/full-stack-feature": 0.88
    invoked-by:
      - "domain/frontend-operations"
      - "domain/backend-operations"
      - "orchestration/full-stack-feature"

# Agent consolidation guidelines
consolidation-guidelines:
  remove:
    - full-constitutional-text
    - complete-workflow-descriptions
    - autonomous-decision-logic
    - ambient-context

  retain:
    - purpose-statement
    - tool-list
    - output-format
    - department-affiliation
    - skill-portfolio

  add:
    - merged-from (for tracking)
    - rl_performance (for metrics)

  receive-from-skill:
    - task-description
    - relevant-context-subset
    - output-expectations
    - constraints

  token-budget:
    max-definition: 500
    target-definition: 300
    current-average: 5000
    reduction-target: "90%"

# Migration from v1 to v2
migration:
  from-v1:
    description: "Upgrade from agent-definition v1 to v2"
    steps:
      - "Add skill-portfolio field listing skills agent can execute"
      - "Add merged-from field if consolidating multiple agents"
      - "Add rl_performance field for metrics tracking"
      - "Update invoked-by to reflect skill paths"
      - "Remove autonomous decision-making logic"

  consolidation-map:
    description: "Map original 15 agents to 8 consolidated"
    mapping:
      frontend-specialist: "implementation-specialist"
      full-stack-developer: "implementation-specialist"
      devops-engineer: "operations-specialist"
      performance-engineer: "operations-specialist"
      specification-agent: "specification-orchestrator"
      planning-agent: "specification-orchestrator"
      tasks-agent: "specification-orchestrator"
      prd-specialist: "specification-orchestrator"
      testing-specialist: "quality-specialist"
      security-specialist: "quality-specialist"
      subagent-architect: "system-architect"
      task-orchestrator: "workflow-coordinator"
      backend-architect: "backend-architect"
      database-specialist: "database-specialist"
