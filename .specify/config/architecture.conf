# =============================================================================
# Architecture Configuration
# Feature: 002-skills-first-architecture
# Task: T012
# Purpose: Configure skills-first architecture mode and RL parameters
#
# Valid Modes:
#   - hybrid        : Both patterns work (Phase 1-2, default)
#   - skills-first  : Skills-first default, legacy deprecated (Phase 3-4)
#   - legacy-agents : Legacy agent-first only (pre-migration)
#
# Constitutional Compliance: FR-301 (Hybrid Mode Support)
# =============================================================================

# -----------------------------------------------------------------------------
# Architecture Mode
# -----------------------------------------------------------------------------

# Current architecture mode
# - hybrid: Both skills-first and legacy agent-first patterns work
# - skills-first: Skills are primary, legacy emits deprecation warnings
# - legacy-agents: Only legacy patterns work (pre-migration state)
ARCHITECTURE_MODE=skills-first

# Phase indicator (1-4)
# Phase 1-2: Foundation + RL (hybrid mode)
# Phase 3-4: Constitutional amendment + migration (skills-first mode)
CURRENT_PHASE=4

# Target completion date for skills-first transition
TARGET_SKILLS_FIRST_DATE=2026-01-13

# -----------------------------------------------------------------------------
# RL Configuration
# -----------------------------------------------------------------------------

# RL algorithm for skill selection
# - ema: Exponential Moving Average (Phase 1-2, simple)
# - grpo: Generalized Reward Policy Optimization (Phase 3-4)
# - ppo: Proximal Policy Optimization (Phase 3-4)
# - disabled: Rule-based selection only (baseline)
RL_ALGORITHM=ema

# Learning rate for weight updates (0.01-0.5)
RL_LEARNING_RATE=0.1

# Reward weights (should sum to 1.0)
RL_REWARD_WEIGHT_SUCCESS=0.5
RL_REWARD_WEIGHT_TOKEN_EFFICIENCY=0.3
RL_REWARD_WEIGHT_USER_SATISFACTION=0.2

# Selection temperature for softmax
# - < 1.0: More exploitation (prefer higher weights)
# - = 1.0: Balanced
# - > 1.0: More exploration
RL_SELECTION_TEMPERATURE=1.0

# Weight bounds
RL_MIN_WEIGHT=0.1
RL_MAX_WEIGHT=1.0

# Evaluation window in days for RL metrics
RL_EVALUATION_WINDOW_DAYS=30

# Maximum learning history entries per skill
RL_MAX_HISTORY_ENTRIES=100

# Target improvement over baseline (15-25%)
RL_TARGET_IMPROVEMENT=0.20

# -----------------------------------------------------------------------------
# Agent Consolidation
# -----------------------------------------------------------------------------

# Enable agent consolidation (8 domain agents from 15)
AGENT_CONSOLIDATION_ENABLED=true

# Original agent count
ORIGINAL_AGENT_COUNT=15

# Target consolidated agent count
TARGET_AGENT_COUNT=8

# DS-STAR agent count (separate, not consolidated)
DS_STAR_AGENT_COUNT=5

# Total target agent count (domain + DS-STAR)
TOTAL_TARGET_AGENTS=13

# Consolidation ratio target (47% reduction)
CONSOLIDATION_RATIO_TARGET=0.53

# -----------------------------------------------------------------------------
# Progressive Disclosure
# -----------------------------------------------------------------------------

# Enable progressive disclosure loading
PROGRESSIVE_DISCLOSURE_ENABLED=true

# Token budget targets per layer
TOKEN_BUDGET_LAYER1=100
TOKEN_BUDGET_LAYER2=500
TOKEN_BUDGET_LAYER3=variable

# Target token reduction (40-50%)
TOKEN_REDUCTION_TARGET=0.45

# -----------------------------------------------------------------------------
# DS-STAR Integration
# -----------------------------------------------------------------------------

# Enable DS-STAR integration with skills-first
DS_STAR_INTEGRATION_ENABLED=true

# FR-707: Compliance check first (mandatory)
FR707_COMPLIANCE_CHECK_FIRST=true

# Verifier accuracy target (95%)
VERIFIER_ACCURACY_TARGET=0.95

# Auto-debug resolution rate target (>70%)
AUTO_DEBUG_RATE_TARGET=0.70

# Context retrieval latency target (<2s)
CONTEXT_RETRIEVAL_LATENCY_TARGET_MS=2000

# Maximum refinement rounds
MAX_REFINEMENT_ROUNDS=20

# Early stop quality threshold
EARLY_STOP_THRESHOLD=0.95

# -----------------------------------------------------------------------------
# Deprecation Settings
# -----------------------------------------------------------------------------

# Enable deprecation warnings for legacy patterns
DEPRECATION_WARNINGS_ENABLED=true

# Deprecation warning level
# - warn: Log warning but allow execution
# - block: Block execution with error (Phase 4)
DEPRECATION_LEVEL=block

# Grace period in days before blocking
DEPRECATION_GRACE_PERIOD_DAYS=0

# Legacy pattern tracking enabled
LEGACY_PATTERN_TRACKING=true

# -----------------------------------------------------------------------------
# Audit and Logging
# -----------------------------------------------------------------------------

# Enable RL audit logging
RL_AUDIT_LOGGING_ENABLED=true

# Audit log location
RL_AUDIT_LOG_PATH=.docs/audit/rl-weight-updates.log

# Compliance check audit log
COMPLIANCE_AUDIT_LOG_PATH=.docs/audit/message-preflight.log

# Performance metrics file
SKILL_PERFORMANCE_FILE=.docs/rl-metrics/skill-performance.json

# Skill index file
SKILL_INDEX_FILE=.claude/skill-index.json

# Agent index file
AGENT_INDEX_FILE=.claude/agent-index.json

# -----------------------------------------------------------------------------
# Feature Flags
# -----------------------------------------------------------------------------

# Enable A/B testing for RL vs rule-based
AB_TESTING_ENABLED=false

# A/B test RL percentage (0-100)
AB_TEST_RL_PERCENTAGE=50

# Enable skill composition
SKILL_COMPOSITION_ENABLED=true

# Enable parallel agent execution
PARALLEL_AGENT_EXECUTION=true

# Enable continuous learning (Phase 4)
CONTINUOUS_LEARNING_ENABLED=true

# -----------------------------------------------------------------------------
# Version Info
# -----------------------------------------------------------------------------

# Configuration version
CONFIG_VERSION=1.0.0

# Last updated
CONFIG_UPDATED=2026-01-13

# Feature reference
FEATURE_ID=002-skills-first-architecture

# Constitutional compliance
CONSTITUTION_VERSION=2.0.0
