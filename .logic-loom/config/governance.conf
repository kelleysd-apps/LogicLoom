# LogicLoom governance configuration
#
# Governance enforcement is hook-side and model-independent (git-safety gate,
# dangerous-command guard, freeze-scope). These run regardless of the mode below.
#
# `mode` controls only the optional MODEL-SIDE assist injected on each message:
#
#   lean   (default) — hooks enforce; NO per-message compliance recitation.
#                      Correct for flagship Opus-class models, which follow the
#                      governance section of CLAUDE.md without prompting.
#
#   strict           — hooks enforce AND the 4-step compliance pre-flight is
#                      re-injected on every message. Use for weaker or
#                      non-flagship models (older Anthropic tiers) that benefit
#                      from the explicit assist. This is the graceful-degradation
#                      path for the harness across model capability.
#
# Override precedence: env LOOM_GOVERNANCE_MODE > this file > built-in default.

mode = lean
