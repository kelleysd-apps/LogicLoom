# =============================================================================
# LogicLoom — framework upstream for /update-framework   (FETCH-ONLY)
# -----------------------------------------------------------------------------
# The single config-driven source for WHERE /update-framework pulls upstream
# framework enhancements from. Read by:
#   plugins/loom-maintenance/scripts/extract-proposals.sh
#
# This is NOT a git remote. /update-framework fetches this URL AD-HOC into the
# namespaced ref `refs/loom-upstream/main` and NEVER creates an `upstream`
# remote, NEVER pushes here, and NEVER merges. ALL of your changes commit to
# YOUR current branch on `origin`. (So there is structurally nothing to
# mis-push to: `git push upstream …` fails with "no such remote".)
#
# Resolution precedence (extract-proposals.sh):
#   1. env  LOOM_UPSTREAM_URL   (per-run override)
#   2. this file: LOOM_UPSTREAM_URL
#   3. this file: LOOM_UPSTREAM_REPO  ->  https://github.com/<repo>.git
#   4. (none resolvable) -> /update-framework prompts you and offers to persist
# The upstream is NEVER derived from `origin` (origin is YOUR repo).
#
# STAMPED AT RELEASE: promote-to-main.yml rewrites this file from `github.repository`
# (this repo) when building the sanitized snapshot for `main`, so every shipped
# template self-describes its correct upstream (robust to a repo rename).
#
# SINGLE PUBLIC REPO: customers fork or "Use this template" from THIS repo, and
# /update-framework pulls the clean template line (this repo's `main`). The DEV
# default below is therefore this repo itself — NOT a separate template repo.
#
# Custom fork pointing elsewhere:  export LOOM_UPSTREAM_URL=https://…/your-fork.git
# =============================================================================

LOOM_UPSTREAM_REPO="kelleysd-apps/sdd-agentic-framework"
LOOM_UPSTREAM_URL="https://github.com/kelleysd-apps/sdd-agentic-framework.git"
