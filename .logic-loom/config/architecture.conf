# =============================================================================
# Architecture Configuration
# Framework: logic-loom v6.1.0 (brand: LogicLoom)
# Architecture: Governance core + interchangeable workflow packs
# Purpose: Configure delegation, workflow packs, and quality gates
#
# Constitutional Compliance: Principle X (Agent Delegation), XIV (AI Model Selection)
#
# Model: workflow packs (swarm / SDD waterfall / dev-loop) are peers — none is
# privileged as "primary" or "legacy". A shared governance core enforces the
# 16 constitutional principles across all packs.
#
# NOTE: RL telemetry was removed in the LogicLoom migration. The only remaining
# RL surface is internal to the loom-dev-loop pack and is configured there, not
# here. There is intentionally no RL or legacy-blocking configuration in this
# file.
# =============================================================================

# -----------------------------------------------------------------------------
# Architecture Mode
# -----------------------------------------------------------------------------

# Current architecture mode (skill-based delegation is the dispatch mechanism)
ARCHITECTURE_MODE=skill-based-delegation

# Skill delegation enabled (skills are the primary dispatch mechanism)
SKILL_DELEGATION_ENABLED=true

# Agent delegation enabled (agents receive delegated work from skills)
AGENT_DELEGATION_ENABLED=true

# -----------------------------------------------------------------------------
# Agent and Skill Counts
# -----------------------------------------------------------------------------

# Total agent count (across all plugins)
TOTAL_AGENT_COUNT=11

# Total plugin count
TOTAL_PLUGIN_COUNT=18

# Total slash command count
TOTAL_COMMAND_COUNT=19

# Agent registry location
AGENT_REGISTRY_PATH=.docs/agents/agent-registry.json

# Skill manifests location (distributed across plugins)
SKILL_MANIFEST_PATH=plugins/*/plugin.json

# -----------------------------------------------------------------------------
# DS-STAR Integration
# -----------------------------------------------------------------------------

# Enable DS-STAR quality gates
DS_STAR_INTEGRATION_ENABLED=true

# Verifier accuracy target (95%)
VERIFIER_ACCURACY_TARGET=0.95

# Auto-debug resolution rate target (>70%)
AUTO_DEBUG_RATE_TARGET=0.70

# Context retrieval latency target (<2s)
CONTEXT_RETRIEVAL_LATENCY_TARGET_MS=2000

# Maximum refinement rounds
MAX_REFINEMENT_ROUNDS=20

# Early stop quality threshold
EARLY_STOP_THRESHOLD=0.95

# Spec completeness threshold (90%)
SPEC_COMPLETENESS_THRESHOLD=0.90

# Plan quality threshold (85%)
PLAN_QUALITY_THRESHOLD=0.85

# Test coverage threshold (80%, matches Principle II)
TEST_COVERAGE_THRESHOLD=0.80

# -----------------------------------------------------------------------------
# Constitutional Preflight Check
# -----------------------------------------------------------------------------

# Enable constitutional preflight check (mandatory)
CONSTITUTIONAL_PREFLIGHT_ENABLED=true

# Preflight check enforces Principle X (delegation)
PREFLIGHT_ENFORCE_DELEGATION=true

# Preflight check enforces Principle VI (git approval)
PREFLIGHT_ENFORCE_GIT_APPROVAL=true

# Hook timeout for preflight operations (seconds)
PREFLIGHT_HOOK_TIMEOUT=5

# -----------------------------------------------------------------------------
# Memory Context Integration
# -----------------------------------------------------------------------------

# Enable automatic memory context injection
MEMORY_CONTEXT_ENABLED=true

# Memory search timeout (seconds)
MEMORY_SEARCH_TIMEOUT=5

# Memory tiers (working, recall, archival)
MEMORY_TIER_WORKING=specs/*/working-memory.md
MEMORY_TIER_RECALL=.docs/agents/*/decisions/
MEMORY_TIER_ARCHIVAL=.docs/archive/

# Maximum memory context tokens
MEMORY_MAX_CONTEXT_TOKENS=2000

# -----------------------------------------------------------------------------
# Feature Flags
# -----------------------------------------------------------------------------

# Enable skill composition
SKILL_COMPOSITION_ENABLED=true

# Enable parallel agent execution
PARALLEL_AGENT_EXECUTION=true

# Enable modular context loading (37% token efficiency)
MODULAR_CONTEXT_ENABLED=true

# Progressive disclosure enabled
PROGRESSIVE_DISCLOSURE_ENABLED=true

# -----------------------------------------------------------------------------
# Audit and Logging
# -----------------------------------------------------------------------------

# Compliance check audit log
COMPLIANCE_AUDIT_LOG_PATH=.docs/audit/message-preflight.log

# -----------------------------------------------------------------------------
# Test Suite Configuration
# -----------------------------------------------------------------------------

# Total test suite count
TEST_SUITE_COUNT=27

# Total test count
TEST_TOTAL_COUNT=1322

# Test coverage target (matches TEST_COVERAGE_THRESHOLD)
TEST_COVERAGE_TARGET=0.80

# Test suites location
TEST_SUITES_PATH=tests/

# -----------------------------------------------------------------------------
# Version Info
# -----------------------------------------------------------------------------

# Configuration version
CONFIG_VERSION=6.1.0

# Framework version
FRAMEWORK_VERSION=6.1.0

# Architecture version
ARCHITECTURE_VERSION=6.1.0

# Constitution version
CONSTITUTION_VERSION=3.1.0

# Last updated
CONFIG_UPDATED=2026-05-29

# Architecture reference
ARCHITECTURE_ID=governance-core-workflow-packs-v6.1
