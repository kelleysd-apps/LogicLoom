# LogicLoom model configuration (role -> tier)
#
# Documented convention (Constitution Principle XIV). Agents/commands select
# tiers via frontmatter keywords (opus/sonnet/haiku/inherit); this file records
# the role->tier mapping and current flagship. No runtime resolver consumes it
# yet — it is a reference table, not a parsed config.
#
# MODEL & PROVIDER BOUNDARY: the orchestration runtime is Claude-Code-native and
# runs Anthropic models only. Cross-provider models (OpenAI/Gemini/Mistral) are
# supported solely at the delegated research / verification layer — never for
# orchestration. Two consumers today:
#   - /research        : spawns researchers/judges that call OpenAI/Gemini APIs.
#   - /cross-check     : the governed cross-provider adversarial reviewer (also
#                        wired into /review-team and /plan-review). The external
#                        model is held strictly ADVISORY + READ-ONLY — it emits
#                        findings; the governed Claude agent triages and decides.
# In all cases the external model never writes repo source, runs git, or makes a
# control-flow decision. The instant it would, it has crossed into orchestration
# and violated this boundary (and Principle VI).
#
# PORTABILITY (superseded stance): this Claude-Code-native runtime is the
# REFERENCE host. The POLICY layer (constitution + AGENTS.md Tier 1 + the
# Cross-Check Disposition) is provider-neutral and travels to any host as
# model-followed rules; ENFORCEMENT (the hooks) does not travel — see the
# enforced-vs-followed matrix in .docs/architecture/governance-threat-model.md.
# NEUTRAL READING of the tier keywords on a non-Claude host: opus -> your
# most-capable reasoning model; sonnet -> a balanced model; haiku -> a
# cheaper/faster model.

# Current Anthropic flagship (for reference; agents use the tier keyword "opus")
FLAGSHIP_MODEL = claude-opus-4-8

# Role -> tier. Tiers resolve to the current model in each class at runtime.
LOOM_MODEL_DEFAULT   = opus     # general specialized work
LOOM_MODEL_ARCHITECT = opus     # planning, architecture, complex reasoning
LOOM_MODEL_WORKER    = opus     # swarm/team implementors (set to sonnet for cost)
LOOM_MODEL_REVIEWER  = opus     # review-team, plan-review, evaluators
LOOM_MODEL_MEMORY    = haiku    # memory context injection, quick lookups
LOOM_MODEL_QUICK     = haiku    # formatting, file ops, trivial tasks

# Model IDs by tier (update when a new flagship ships)
#   opus   -> claude-opus-4-8
#   sonnet -> claude-sonnet-4-6
#   haiku  -> claude-haiku-4-5-20251001
