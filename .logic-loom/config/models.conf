# LogicLoom model configuration (role -> model)
#
# Single source of truth for model selection (Constitution Principle XIV).
# Swapping the flagship or a per-role tier is one edit here — agents/commands
# reference TIER KEYWORDS (opus/sonnet/haiku/inherit), never pinned version
# strings, so they follow this config automatically.
#
# MODEL & PROVIDER BOUNDARY: the orchestration runtime is Claude-Code-native and
# runs Anthropic models only. Cross-provider models (OpenAI/Gemini/Mistral) are
# supported solely at the delegated research/verification layer via
# plugins/loom-dev-loop/lib/tribunal-api.sh (+ .env keys) — never for orchestration.
#
# Override precedence: env LOOM_MODEL_* > this file > built-in default.

# Current Anthropic flagship (for reference; agents use the tier keyword "opus")
FLAGSHIP_MODEL = claude-opus-4-8

# Role -> tier. Tiers resolve to the current model in each class at runtime.
LOOM_MODEL_DEFAULT   = opus     # general specialized work
LOOM_MODEL_ARCHITECT = opus     # planning, architecture, complex reasoning
LOOM_MODEL_WORKER    = opus     # swarm/team implementors (set to sonnet for cost)
LOOM_MODEL_REVIEWER  = opus     # review-team, plan-review, evaluators
LOOM_MODEL_MEMORY    = haiku    # memory context injection, quick lookups
LOOM_MODEL_QUICK     = haiku    # formatting, file ops, trivial tasks

# Model IDs by tier (update when a new flagship ships)
#   opus   -> claude-opus-4-8
#   sonnet -> claude-sonnet-4-6
#   haiku  -> claude-haiku-4-5-20251001
