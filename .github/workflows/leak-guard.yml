name: Leak Guard (PRs → main)

# =============================================================================
# PUBLIC-template backstop. Lives on the customer-template `main` and fails ANY
# pull request into main that carries a sensitive identity marker. It is the
# last line before an unsanitized branch — e.g. a mistargeted release branch —
# lands on the template.
#
# The marker patterns are NOT inlined here, so this public workflow file does not
# itself publish the confidential strings. They are read from the repo variable
# `vars.LEAK_MARKERS` — an ERE alternation (e.g. 'foo@example\.com|legacy-name|/abs/path/').
# Configure it in repo Settings → Variables. The check FAILS CLOSED if it is unset.
#
# Tamper-proof: for `pull_request` events GitHub evaluates this workflow from the
# BASE branch (main), and repo variables are not PR-editable — so a hostile or
# mistargeted PR can neither rewrite the grep nor change the markers. The scan is
# intentionally STRICT (no path excludes): any tracked file carrying a marker
# fails the PR, which is exactly the unsanitized-content case we want to catch.
#
# This is NOT the full manifest-driven leak-guard.sh (maintainer-only, runs in
# the promotion build). This is a narrow, dependency-free grep.
# =============================================================================

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  leak-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Assert no sensitive identity markers in tracked content
        env:
          LEAK_MARKERS: ${{ vars.LEAK_MARKERS }}
        run: |
          set -euo pipefail
          if [ -z "${LEAK_MARKERS:-}" ]; then
            echo "::error::vars.LEAK_MARKERS is not set — leak-guard fails closed. Set it in repo Settings → Variables to an ERE alternation of confidential markers."
            exit 1
          fi
          if hits=$(git grep -nIE "$LEAK_MARKERS" -- . 2>/dev/null) && [ -n "$hits" ]; then
            echo "::error::Sensitive identity marker(s) found in tracked content:"
            printf '%s\n' "$hits" | head -30
            exit 1
          fi
          echo "leak-guard: clean (no sensitive identity markers)"
