name: Tag release on main

# =============================================================================
# Completes the release flow at the HUMAN gate: when a maintainer MERGES a
# promotion PR into the protected `main` (a merge commit; see promote-to-main.yml),
# this auto-applies the `vX.Y.Z` tag to the sanitized snapshot commit — so the
# maintainer never has to hand-tag, and `main` protection is never bypassed.
#
# Trigger is `push: main` (NOT pull_request): a push-triggered workflow runs the
# copy of this file AT THE PUSHED COMMIT, so it works the first time the snapshot
# that carries this file lands on main (a pull_request trigger would need the file
# to already be on the base branch, which it isn't until after the merge).
#
# It reads the snapshot commit (C1) straight from `.sdd-sync-ref` and tags it.
# IMPORTANT (why not scan `git log`): the promotion MERGE commit's FIRST parent is
# the OLD main, so C1 is on the SECOND parent — a `git log` walk can miss it, and a
# shallow checkout may not even fetch it (this silently no-op'd v6.3.1). `.sdd-sync-ref`
# is the authoritative pointer; `fetch-depth: 0` guarantees C1's object is present.
# Idempotent: skips if the tag already exists. `main` is protected, so the only
# pushes here are release merges — a crafted `release:` commit can't reach `main`
# without a human merge.
#
# Maintainer-only: ships to `main` (must be there to run on main pushes) and is
# removed from a customer project at /initialize-project — like promote-to-main.yml.
#
# DEPENDENCY: the `v*` tag namespace must NOT be covered by a tag-protection rule
# / ruleset that excludes GITHUB_TOKEN, or the `git push origin <tag>` below will
# be rejected. (No such ruleset exists today; add a `refs/tags/v*` bypass for
# Actions if you ever add one.)
# =============================================================================

on:
  push:
    branches: [main]

permissions:
  contents: write          # push the tag (repo default_workflow_permissions is read)

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history: C1 is on the merge's 2nd parent

      - name: Tag the sanitized snapshot if this push landed a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The sanitized snapshot (C1) is recorded in .sdd-sync-ref by promote.
          # Read it directly — do NOT scan `git log` (C1 is on the merge's 2nd
          # parent and a walk/shallow-fetch can miss it; that silently no-op'd v6.3.1).
          SNAP=""
          [ -f .sdd-sync-ref ] && SNAP=$(tr -d '[:space:]' < .sdd-sync-ref)
          if [ -z "$SNAP" ] || ! git cat-file -e "${SNAP}^{commit}" 2>/dev/null; then
            echo "No usable .sdd-sync-ref snapshot — nothing to tag."; exit 0
          fi
          VER=$(git log -1 --format=%s "$SNAP" \
                  | sed -n -E 's/^release: (v[0-9]+\.[0-9]+\.[0-9]+) sanitized template.*/\1/p')
          if [ -z "$VER" ]; then
            echo ".sdd-sync-ref ($SNAP) is not a release snapshot — nothing to tag."; exit 0
          fi
          if git rev-parse -q --verify "refs/tags/$VER" >/dev/null 2>&1 \
             || git ls-remote --exit-code --tags origin "$VER" >/dev/null 2>&1; then
            echo "Tag $VER already exists — nothing to do."; exit 0
          fi
          git tag "$VER" "$SNAP"
          git push origin "$VER"
          echo "Tagged $VER -> $SNAP (sanitized snapshot)."
