name: Plugin & Framework Tests

on:
  push:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - 'mcp-servers/**'
      - '.claude/commands/**'
      - '.specify/scripts/**'
  pull_request:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - 'mcp-servers/**'
      - '.claude/commands/**'
      - '.specify/scripts/**'

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MCP Server Dependencies
        run: |
          cd mcp-servers/sdd-marketplace && npm install --production

      - name: Run Plugin Contract Tests
        run: bash tests/contract/plugins/test_plugin_lifecycle.sh

      - name: Run Swarm Contract Tests
        run: bash tests/contract/plugins/test_swarm_lifecycle.sh

      - name: Run RL Metrics Tests
        run: bash tests/contract/plugins/test_rl_metrics.sh

      - name: Run Constitution Tests
        run: bash tests/contract/test_constitution.sh

      - name: Run Deprecation Tests
        run: bash tests/contract/test_deprecation.sh

      - name: Run Plugin Command Bridge Tests
        run: bash tests/contract/test_plugin_command_bridge.sh

      - name: Run Marketplace Unit Tests
        run: node --test mcp-servers/sdd-marketplace/src/__tests__/marketplace.test.js

      - name: Validate All Manifests
        run: |
          python3 -c "
          import json, os, sys
          errors = []
          for name in sorted(os.listdir('plugins')):
              manifest = os.path.join('plugins', name, '.claude-plugin', 'plugin.json')
              if not os.path.exists(manifest):
                  continue
              try:
                  with open(manifest) as f:
                      d = json.load(f)
                  for field in ['name', 'version', 'dependencies']:
                      if field not in d:
                          errors.append(f'{name}: missing {field}')
                  if 'rl_metrics' not in d:
                      errors.append(f'{name}: missing rl_metrics')
              except json.JSONDecodeError as e:
                  errors.append(f'{name}: invalid JSON - {e}')
          if errors:
              for e in errors:
                  print(f'❌ {e}')
              sys.exit(1)
          else:
              print(f'✅ All plugin manifests valid')
          "

      - name: Constitutional Compliance Check
        if: github.event_name == 'pull_request'
        run: |
          if [ -f .specify/scripts/bash/constitutional-check.sh ]; then
            bash .specify/scripts/bash/constitutional-check.sh || true
          fi
